name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Last Commit Message
        id: check_commit
        run: echo "LAST_COMMIT_MSG=$(git log -1 --pretty=%s)" >> $GITHUB_ENV

      - name: Check Chore Commit
        id: is_chore
        run: |
          if [[ "${{ env.LAST_COMMIT_MSG }}" == chore* ]]; then
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registery.npmjs.org'

      - name: Generate .npmrc
        run: make create-npmrc

      - name: Install Dependencies
        if: env.SKIP_PUBLISH == 'false'
        run: npm ci

      - name: Build Package
        if: env.SKIP_PUBLISH == 'false'
        run: npm run build --workspace=@sidakram/react-rendercov

      - name: Version Bump
        if: env.SKIP_PUBLISH == 'false'
        run: |
          git fetch origin main
          git rebase origin/main
          npm version minor --workspace=@sidakram/react-rendercov
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): bump version"
          git push origin main

      - name: Push Version Changes
        run: git push origin main --tags

      - name: Publish to npm
        if: env.SKIP_PUBLISH == 'false'
        id: publish
        run: npm publish --access public --provenance --workspace=@sidakram/react-rendercov --no-package-lock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
